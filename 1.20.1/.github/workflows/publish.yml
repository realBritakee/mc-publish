name: Publish Mod

# Triggers only when a GitHub Release is published
on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17' # Minecraft 1.20.1 requires Java 17
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # Compiles the 1.20.1 Forge mod
      - name: Build Mod
        run: ./gradlew build

      # Uploads to platforms
      - name: Publish to Modrinth and CurseForge
        uses: Kir-Antipov/mc-publish@v3
        with:
          # REPLACE THESE with your actual project IDs for this specific mod
          curseforge-id: 123456 
          modrinth-id: A1b2C3d4 

          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}

          # Grabs the compiled mod jar (ignores dev or source jars)
          files: build/libs/!(*-sources|*-dev).jar 

          # Pulls the release info straight from GitHub
          name: ${{ github.event.release.name }}
          version: ${{ github.event.release.tag_name }}
          changelog: ${{ github.event.release.body }}

          # 1.20.1 Forge specific targets
          loaders: forge
          game-versions: 1.20.1